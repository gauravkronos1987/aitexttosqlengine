name: Trigger auto deployment for aitexttosql

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/aitexttosql-AutoDeployTrigger-310540f4-e231-4523-9ac2-e5490a6b66a7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AITEXTTOSQL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AITEXTTOSQL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AITEXTTOSQL_AZURE_SUBSCRIPTION_ID }}

      - name: Login to container registry
        uses: docker/login-action@v2
        with:
          registry: ${{ secrets.AITEXTTOSQL_REGISTRY_URL }}
          username: ${{ secrets.AITEXTTOSQL_REGISTRY_USERNAME }}
          password: ${{ secrets.AITEXTTOSQL_REGISTRY_PASSWORD }}

      - name: Build and push Docker image
        uses: docker/build-push-action@v4
        with:
          context: .
          file: dockerfile
          push: true
          tags: ${{ secrets.AITEXTTOSQL_REGISTRY_URL }}/aitexttosql:${{ github.sha }}

      - name: Deploy container app using pushed image
        uses: azure/container-apps-deploy-action@v2
        with:
          imageToDeploy: ${{ secrets.AITEXTTOSQL_REGISTRY_URL }}/aitexttosql:${{ github.sha }}
          registryUsername: ${{ secrets.AITEXTTOSQL_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AITEXTTOSQL_REGISTRY_PASSWORD }}
          containerAppName: aitexttosql
          resourceGroup: AITEXTTOSQLENGINE_group


