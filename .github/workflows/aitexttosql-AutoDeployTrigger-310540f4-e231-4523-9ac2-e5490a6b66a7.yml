name: Trigger auto deployment for aitexttosql

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/aitexttosql-AutoDeployTrigger-310540f4-e231-4523-9ac2-e5490a6b66a7.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AITEXTTOSQL_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AITEXTTOSQL_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AITEXTTOSQL_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          dockerfilePath: dockerfile
          # If your Dockerfile uses a different name or location, adjust above.
          _targetLabelKey_: _targetLabel_
          registryUrl: 
          registryUsername: ${{ secrets.AITEXTTOSQL_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.AITEXTTOSQL_REGISTRY_PASSWORD }}
          containerAppName: aitexttosql
          resourceGroup: AITEXTTOSQLENGINE_group
          imageToBuild: default/[parameters('containerAppName')]:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


